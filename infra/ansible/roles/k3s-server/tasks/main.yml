---
# installs k3s on the control plane node and fetches the kubeconfig

- name: Check if k3s is already installed
  stat:
    path: /usr/local/bin/k3s
  register: k3s_binary

- name: Download and install k3s server
  shell: |
    curl -sfL https://get.k3s.io | INSTALL_K3S_VERSION="{{ k3s_version }}" sh -s - \
      --disable traefik \
      --write-kubeconfig-mode 644
  when: not k3s_binary.stat.exists

- name: Wait for k3s to be ready
  wait_for:
    path: /var/lib/rancher/k3s/server/node-token
    state: present
    timeout: 120

- name: Read the node join token
  slurp:
    src: /var/lib/rancher/k3s/server/node-token
  register: k3s_token_raw

- name: Store join token as a fact for workers to use
  set_fact:
    k3s_node_token: "{{ k3s_token_raw.content | b64decode | trim }}"

- name: Copy kubeconfig to local machine
  fetch:
    src: /etc/rancher/k3s/k3s.yaml
    dest: "{{ playbook_dir }}/../../kubeconfig"
    flat: true

- name: Fix kubeconfig server address to use the real public IP
  delegate_to: localhost
  become: false
  replace:
    path: "{{ playbook_dir }}/../../kubeconfig"
    regexp: "https://127.0.0.1:6443"
    replace: "https://{{ ansible_host }}:6443"

- name: Enable and start k3s service
  systemd:
    name: k3s
    enabled: true
    state: started
