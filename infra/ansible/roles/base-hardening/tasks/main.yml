---
# runs on every node - sets up a non-root user, SSH key-only login, and UFW firewall

- name: Update apt package cache
  apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install required packages
  apt:
    name:
      - ufw
      - curl
      - unzip
      - python3-pip
    state: present

- name: Create admin user
  user:
    name: "{{ admin_user }}"
    groups: "{{ admin_group }}"
    shell: /bin/bash
    create_home: true
    state: present

- name: Copy SSH authorized keys to admin user
  authorized_key:
    user: "{{ admin_user }}"
    state: present
    key: "{{ lookup('file', '~/.ssh/id_rsa.pub') }}"

- name: Allow admin user to run sudo without password
  lineinfile:
    path: /etc/sudoers.d/{{ admin_user }}
    line: "{{ admin_user }} ALL=(ALL) NOPASSWD:ALL"
    create: true
    validate: "visudo -cf %s"

- name: Disable SSH password authentication
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^#?PasswordAuthentication"
    line: "PasswordAuthentication no"
    state: present
  notify: restart sshd

- name: Disable root SSH login
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^#?PermitRootLogin"
    line: "PermitRootLogin no"
    state: present
  notify: restart sshd

- name: Set UFW default policies
  ufw:
    state: enabled
    policy: deny
    direction: incoming

- name: Allow outbound traffic
  ufw:
    policy: allow
    direction: outgoing

- name: Allow SSH
  ufw:
    rule: allow
    port: "22"
    proto: tcp

- name: Allow HTTP (needed for cert-manager ACME challenge)
  ufw:
    rule: allow
    port: "80"
    proto: tcp

- name: Allow HTTPS
  ufw:
    rule: allow
    port: "443"
    proto: tcp

- name: Allow k3s API server within VPC
  ufw:
    rule: allow
    port: "6443"
    proto: tcp
    src: "10.0.0.0/16"

- name: Allow k3s node-to-node traffic (Flannel VXLAN)
  ufw:
    rule: allow
    port: "8472"
    proto: udp
    src: "10.0.0.0/16"

- name: Allow k3s metrics and kubelet
  ufw:
    rule: allow
    port: "10250"
    proto: tcp
    src: "10.0.0.0/16"
